<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Matrix Manager · Canvas</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/canvas.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>Matrix Manager</h1>
        <p>Spatial staffing canvas.</p>
      </div>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/canvas">Canvas</a>
      </nav>
    </header>

    <main class="canvas-shell">
      <div class="canvas-toolbar">
        <div>
          <h2>Staffing canvas</h2>
          <p>Drag to pan. Right-click anywhere for quick actions.</p>
        </div>
        <div class="toolbar-actions">
          <label class="unit-toggle">Allocation units
            <select id="allocation-units">
              <option value="percent">Percent only</option>
              <option value="percent-hours">Percent + hours</option>
            </select>
          </label>
          <button type="button" id="reset-view" class="ghost-button">Reset view</button>
        </div>
      </div>
      <div id="canvas-stage" class="canvas-stage">
        <div id="canvas-content" class="canvas-content"></div>
        <div class="canvas-legend">
          <strong>Legend</strong>
          <ul>
            <li><span class="legend-swatch employee"></span>Employee node</li>
            <li><span class="legend-swatch project"></span>Project box</li>
            <li><span class="legend-swatch assignment"></span>Assignment chip</li>
            <li><span class="legend-swatch over"></span>Over capacity</li>
          </ul>
        </div>
      </div>

      <div id="context-menu" class="context-menu hidden">
        <button type="button" data-action="create-project">Create project</button>
        <button type="button" data-action="add-assignment">Add assignment</button>
        <button type="button" data-action="edit-employee" class="hidden">Edit employee</button>
        <button type="button" data-action="edit-project" class="hidden">Edit project</button>
        <button type="button" data-action="remove-assignment" class="hidden">Remove assignment</button>
      </div>

      <div id="canvas-modal" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-content">
          <button type="button" class="modal-close" id="modal-close" aria-label="Close">×</button>
          <div id="modal-body"></div>
        </div>
      </div>
    </main>

    <div id="toast" role="status" aria-live="polite"></div>

    <script type="module" src="/static/canvas.js"></script>
  </body>
</html>
