services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: matrixmanager:beta
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MATRIX_SQLITE_PATH: /data/sqlite/matrix.db
      MATRIX_CONTROL_DB_PATH: /data/app/matrixmanager_control.db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "${MATRIX_APP_PORT:-8000}:8000"
    volumes:
      - ./data/sqlite:/data/sqlite
      - ./data/app:/data/app
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    profiles:
      - postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-matrixmanager}
      POSTGRES_USER: ${POSTGRES_USER:-matrixmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matrixmanager-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-matrixmanager} -d ${POSTGRES_DB:-matrixmanager}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
